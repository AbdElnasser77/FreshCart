<div
    class="grid grid-cols-[repeat(auto-fill,minmax(300px,1fr))] gap-5 p-5 bg-gray-100 min-h-screen">
    @for (product of products(); track $index) {
    <div class="w-full max-w-sm bg-white/90 overflow-hidden rounded-2xl shadow-xs border border-gray-100 flex flex-col">
        <a routerLink="/product-details/{{product._id}}" class="relative block group">
            <img class="h-100 mb-4 w-full object-cover object-[50%_20%] -scale-x-120 transition-opacity duration-300 group-hover:opacity-0"
                [src]="product.imageCover" />
            <img class="h-100 mb-4 w-full object-cover -scale-x-120 absolute top-0 left-0 opacity-0 transition-opacity duration-300 group-hover:opacity-100"
                [src]="product.images[2]" />
        </a>
        <div class="p-4 flex flex-col grow">
            <div class="flex justify-between">
                <p class="text-main text-sm">{{product.category.name}}</p>
                <div class="flex items-center">
                    <svg lucideStar [size]="22" class="text-main pe-1"></svg>
                    <p class="flex text-sm">{{product.ratingsAverage}} <span
                            class="text-gray-700">({{product.ratingsQuantity}})</span></p>
                </div>
            </div>
            <div class="flex">
                <a href="#">
                    <h5 class="text-lg text-heading font-semibold tracking-tight line-clamp-2">{{product.title}}</h5>
                    <p class="text-sm text-gray-600 line-clamp-2">{{product.description}}</p>
                </a>
            </div>

            <div class="flex items-center justify-between pt-5 mt-auto">
                <span class="text font-semibold text-heading">{{ product.price | currency:'LE'}}</span>

                <button
                    class="flex px-3 justify-center items-center bg-main/80 rounded-xl cursor-pointer transition duration-300 text-white py-3 hover:bg-green-800 ">
                    <svg lucidePlus [size]="25" class="pe-1"></svg> Add to Cart
                </button>
            </div>

        </div>
    </div>
    }

</div>
