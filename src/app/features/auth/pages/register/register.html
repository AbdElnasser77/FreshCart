<div class="max-w-md mx-auto my-10 border border-gray-200 shadow p-5">
  <h2 class="font-bold mb-5 text-xl">Register</h2>
  <form [formGroup]="registerForm">
    <div class="mb-5">
      <label for="userName" class="block mb-2 text-sm font-medium text-gray-900">Username</label>
      <input
        id="userName"
        type="text"
        formControlName="userName"
        class="bg-gray-50 border border-gray-300 text-gray-900 text-sm rounded-lg focus:ring-main focus:border-main block w-full p-2.5"
        placeholder="Username"
      />

      <client-side-validation [control]="registerForm.get('userName')"></client-side-validation>
    </div>
    <div class="mb-5">
      <label for="email" class="block mb-2 text-sm font-medium text-gray-900">Email</label>
      <input
        id="email"
        type="email"
        formControlName="email"
        class="bg-gray-50 border border-gray-300 text-gray-900 text-sm rounded-lg focus:ring-main focus:border-main block w-full p-2.5"
        placeholder="Email"
      />

      <client-side-validation [control]="registerForm.get('email')"></client-side-validation>
    </div>
    <div class="mb-5">
      <label for="password" class="block mb-2 text-sm font-medium text-gray-900">Password</label>
      <input
        type="password"
        formControlName="password"
        class="bg-gray-50 border border-gray-300 text-gray-900 text-sm rounded-lg focus:ring-main focus:border-main block w-full p-2.5"
        placeholder="Password"
      />

      <client-side-validation [control]="registerForm.get('password')"></client-side-validation>
    </div>
    <div class="mb-5">
      <label for="password" class="block mb-2 text-sm font-medium text-gray-900"
        >confirmPassword</label
      >
      <input
        type="password"
        formControlName="rePassword"
        class="bg-gray-50 border border-gray-300 text-gray-900 text-sm rounded-lg focus:ring-main focus:border-main block w-full p-2.5"
        placeholder="confirmPassword"
      />

        @if(registerForm.errors && registerForm.get('rePassword')?.touched){
          <div class="bg-red-100 border border-red-400 text-red-700 px-4 py-3 rounded relative mt-5">
            Passwords Don't Match
          </div>
        }
    </div>
  </form>
  <button
    (click)="register()"
    class="bg-main rounded text-white px-5 py-3 cursor-pointer hover:bg-main/80"
  >
    Register
  </button>
</div>
